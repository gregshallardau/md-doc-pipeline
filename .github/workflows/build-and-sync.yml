name: Build and Sync Documents

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'workspace/**'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (WeasyPrint + cairosvg)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libcairo2 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[azure,mermaid]"

      - name: Build documents (PDF + DOCX)
        run: md-doc build workspace/

      - name: Update document register
        run: md-doc register workspace/

      - name: Sync to Azure Files
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_FILE_SHARE_NAME: ${{ secrets.AZURE_FILE_SHARE_NAME }}
        run: md-doc sync workspace/

      - name: Commit updated register
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add workspace/register.json workspace/register.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update document register [skip ci]"
          git push
