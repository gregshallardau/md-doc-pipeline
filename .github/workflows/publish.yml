name: Publish to PyPI

# Build and publish the package when a version tag (v*) is pushed.
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing (OIDC) — no API token needed.
      # Configure the trusted publisher at https://pypi.org/manage/project/.../settings/publishing/
      # As a fallback, set a PYPI_API_TOKEN secret and pass `password:` to the
      # publish step below instead of relying on OIDC.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
